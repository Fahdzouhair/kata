_schema-version: 3.3.0
ID: KataProject
version: 1.0.0
description: "Demo app."

modules:
  - name: backend_module
    type: nodejs
    path: gen/srv
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api 
        properties:
          srv-url: ${default-url}
    requires:
      - name: db_resource
      - name: auth_resource

  - name: approuter_module
    type: approuter.nodejs
    path: app/router
    requires: 
      - name: srv-api 
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
      - name: auth_resource


  - name: db_module
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: db_resource

resources:
  - name: auth_resource
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
    
  - name: db_resource
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
